name: Check Paper Rewrites

on:
  pull_request:
    paths:
      - 'public/papers.json'
      - 'public/papers/**'
      - 'next.config.mjs'
      - 'package.json'

jobs:
  check-papers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check paper rewrites
        run: npm run check:papers
